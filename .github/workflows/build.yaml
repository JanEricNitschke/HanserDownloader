# This workflow will lint the HanserDownloader repo
name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Installation
        run: uv sync --all-extras --dev

      - name: Lint with ruff
        uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6 # v3
      - name: Check formatting with ruff
        uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6 # v3
        with:
          args: "format --check"

      - name: Typecheck with pyright
        run: uv run pyright

      - name: Thorough check with pylint
        run: uv run pylint download_pdfs.py

      - name: Full pre-commit
        run: uv run pre-commit run --all-files

      - name: Test with pytest
        run: |
          uv run coverage run -m pytest --durations=10
          uv run coverage report -m
          uv run coverage json
          uv run coverage html
      - name: Archive code coverage results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: code-coverage-report-${{ matrix.python-version }}
          path: htmlcov/
